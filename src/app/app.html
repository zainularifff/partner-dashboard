<div class="app-layout">
  <!-- 1. SIDEBAR (Fixed on the left) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span>AISM 2.0</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>analytics</mat-icon>
        <span>Executive Overview</span>
      </a>

      <a routerLink="/oversight" routerLinkActive="active">
        <mat-icon>inventory_2</mat-icon>
        <span>Inventory Oversight</span>
      </a>

      <a routerLink="/partner" routerLinkActive="active">
        <mat-icon>handshake</mat-icon>
        <span>Partner Operations</span>
      </a>

      <a routerLink="/reports" routerLinkActive="active">
        <mat-icon>description</mat-icon>
        <span>AISM Reports</span>
      </a>

      <div class="nav-spacer"></div>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/settings" routerLinkActive="active" class="footer-link">
        <mat-icon>settings</mat-icon>
        <span>Setting</span>
      </a>
      <!-- Optional User Info -->
      <div class="user-info">
        <mat-icon>account_circle</mat-icon>
        <span>Zainul</span>
      </div>
    </div>
  </aside>

  <!-- 2. MAIN BODY (Flex Column) -->
  <main class="main-body">
    
    <!-- 🚀 SCROLL AREA: Only this div gets the scrollbar -->
    <div class="main-content-area">
      <router-outlet></router-outlet>
    </div>

    <!-- 3. PINNED FOOTER: Stays at the bottom of the screen -->
    <footer class="main-footer">
      <div class="footer-left">© 2026 AISM IT Systems</div>
      <div class="footer-right">Version 1.0 | Servers: <span class="status-online">Online</span></div>
    </footer>
    
  </main>
</div>
