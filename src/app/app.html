<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <mat-icon>dashboard</mat-icon>
        <span>CRM EXEC</span>
      </div>
    </div>

    <div class="nav-label">MAIN</div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/project" routerLinkActive="active">
        <mat-icon>assignment</mat-icon>
        <span>Projects</span>
      </a>
      <a routerLink="/asset-utilization" routerLinkActive="active">
        <mat-icon>inventory</mat-icon>
        <span>Asset Utilization</span>
      </a>
    </nav>

    <div class="nav-label">SYSTEM</div>
    <nav class="sidebar-nav">
      <a routerLink="/reports" routerLinkActive="active">
        <mat-icon>assessment</mat-icon>
        <span>Reports</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </a>
    </nav>

    <!-- SATU SIDEBAR-FOOTER JE - dengan dua button -->
    <div class="sidebar-footer">
      <!-- Theme Toggle Button -->
      <div class="footer-link" (click)="toggleTheme()">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
      </div>
      
      <!-- Logout Button -->
      <div class="footer-link" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </div>
    </div>
  </div>

  <!-- Main Body -->
  <div class="main-body">
    
    <!-- GLOBAL LOADING -->
    <div class="global-loading" *ngIf="loadingService.loading$ | async">
      <div class="loading-content">
        <mat-icon class="spin">sync</mat-icon>
        <p>Loading...</p>
      </div>
    </div>

    <!-- Content Area -->
    <div class="main-content-area">
      <router-outlet></router-outlet>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
      <span>© 2024 CRM Executive</span>
      <span>v2.0.0</span>
    </footer>

  </div>
</div>
