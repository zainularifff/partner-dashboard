<div class="app-layout">
  <!-- SIDEBAR (Fixed on the left) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">AISM 2.0</div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>analytics</mat-icon>
        <span>Executive Overview</span>
      </a>

      <a routerLink="/oversight" routerLinkActive="active">
        <mat-icon>inventory_2</mat-icon>
        <span>Inventory Oversight</span>
      </a>

      <a routerLink="/partner" routerLinkActive="active">
        <mat-icon>handshake</mat-icon>
        <span>Partner Operations</span>
      </a>

      <a routerLink="/reports" routerLinkActive="active">
        <mat-icon>description</mat-icon>
        <span>AISM Reports</span>
      </a>

      <!-- Pushes everything below to the bottom -->
      <div class="nav-spacer"></div>

      <!-- <a routerLink="/settings" routerLinkActive="active">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </a> -->
    </nav>

    <div class="sidebar-footer">
      <!-- Settings Link inside Footer -->
      <a routerLink="/settings" routerLinkActive="active" class="footer-link">
        <mat-icon>settings</mat-icon>
        <span>Setting</span>
      </a>

      <!-- User Profile Section -->
      <!-- <div class="user-info">
        <div class="avatar">AD</div>
        <span>Admin User</span>
      </div> -->
    </div>

  </aside>

  <!-- MAIN CONTENT AREA (Where your dashboard lives) -->
  <main class="main-body">
    <!-- Container for the dashboard content -->
    <div class="dashboard-scroll-area">
      <router-outlet></router-outlet>
    </div>

    <!-- YOUR NEW FOOTER -->
    <footer class="main-footer">
      <div class="footer-left">© 2026 AISM 2.0 System</div>
      <div class="footer-right">Version 1.0 | System Status: <span class="status-online">Online</span></div>
    </footer>
  </main>
</div>
