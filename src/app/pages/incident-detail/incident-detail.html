<div class="page">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="sup">SERVICE DESK OPERATIONS</div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="back-btn" (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>Open Ticket Records</h1>
      </div>
    </div>
    
    <div class="header-actions">
        <div class="search-box" [class.active]="isFocused">
            <mat-icon>search</mat-icon>
            <input 
              type="text" 
              placeholder="Search ID, Title or Source IP..." 
              [(ngModel)]="searchTerm" 
              (input)="onSearchChange()"
              (focus)="isFocused = true" 
              (blur)="isFocused = false">
            
            <button *ngIf="searchTerm" class="clear-btn" (click)="searchTerm=''; onSearchChange()">
              <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>
  </div>

  <!-- THE WHITE CARD -->
  <div class="card table-card-main">
    <!-- LOADING STATE -->
    <div class="loader-container" *ngIf="isLoading">
      <div class="spinner"></div>
      <div class="loader-text">
        <span>Retrieving Live Data</span>
        <!-- <small>Connecting to SQL Clusters .70 & .51...</small> -->
      </div>
    </div>

    <!-- TABLE STATE -->
    <ng-container *ngIf="!isLoading">
      <div class="table-scroll">
        <table class="detail-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>TITLE / DESCRIPTION</th>
              <th>SOURCE</th>
              <th>SUBMITTED ON</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let t of tickets">
              <td class="bold">#{{t.id}}</td>
              <td class="title-text">{{t.title}}</td>
              <td>{{t.source}}</td>
              <td class="date-text">{{t.date}}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ✅ CLEANER PAGINATION FOOTER -->
      <div class="pagination-footer">
        <div class="footer-left">
          <div class="page-info">
            Showing <b>{{tickets.length}}</b> of <b>{{filteredData.length}}</b> entries
          </div>
          
          <div class="page-size-filter">
            <span>Show</span>
            <select (change)="onPageSizeChange($event)">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>

        <div class="btn-group-nav">
          <button class="btn-nav" [disabled]="currentPage === 1" (click)="prevPage()">Previous</button>
          <span class="page-num">Page {{currentPage}} of {{totalPages}}</span>
          <button class="btn-nav" [disabled]="currentPage === totalPages" (click)="nextPage()">Next</button>
        </div>
      </div>
    </ng-container>
  </div>
</div>
