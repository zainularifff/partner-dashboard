<div class="login-page">
  <div class="login-card">
    
    <div class="brand-section">
      <div class="logo-placeholder">AISM</div>
      <h2>nPoints™ AISM</h2>
      <p>Unified Partner Management Portal</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label>Login ID / Email</label>
        <input 
          type="text" 
          [(ngModel)]="username" 
          name="username" 
          placeholder="admin@partner.com" 
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••" 
          required>
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox"> Remember Me
        </label>
        <a href="#" class="forgot-pass">Forget Password?</a>
      </div>

      <button type="submit" class="btn-login">Log In</button>
    </form>

    <div class="footer-note">
      <p>Protected by AISM Security Gateway. © 2026</p>
    </div>
  </div>
</div>
