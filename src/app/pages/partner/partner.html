      <h1>Summary Report</h1>
    </div>
    <button class="btn-export" (click)="generateAIAnalysis()" [disabled]="isAnalyzing">
      <mat-icon *ngIf="!isAnalyzing">psychology</mat-icon>
      <mat-icon *ngIf="isAnalyzing" class="spin">sync</mat-icon>
      {{ isAnalyzing ? 'AI IS ANALYZING...' : 'Full Gemini AI Report Analysis' }}
    </button>
  </div>

  <div class="ai-result-card card" *ngIf="aiResult">
    <div class="ai-header">
      <mat-icon>auto_awesome</mat-icon>
      <h3>STRATEGIC AI INSIGHTS</h3>
    </div>
    <div class="ai-content">
      <p>{{ aiResult }}</p>
    </div>
    <div class="ai-footer">
      <small>Analysis powered by Gemini 1.5 Flash • Based on Real-time SQL Data</small>
    </div>
  </div>

  <div class="section-label">Summary Report</div>
  <div class="report-grid">
    <div class="card report-card" *ngFor="let r of reports">
      <div class="report-main">
        <div class="icon-box">
          <mat-icon>{{ r.icon }}</mat-icon> 
        </div>
        <div class="rep-details">
          <span class="rep-title">{{ r.name }}</span>
          <span class="rep-status">{{ r.status }}</span>
        </div>
      </div>
      <button class="btn-dl" (click)="downloadReport(r.name)" [title]="'Download ' + r.name">
        <mat-icon>download</mat-icon>
      </button>
    </div>
  </div>

  <div class="card custom-report-card">
    <div class="report-header">
      <mat-icon>settings_suggest</mat-icon>
      <h3>Custom Analysis Builder</h3>
    </div>

    <div class="builder-grid">
      <div class="input-group">
        <label>Select Brand</label>
        <select class="custom-select" #brandSelect>
          <option value="All Brands">All Brands</option>
          <option value="ASUS Fleet">ASUS Fleet</option>
          <option value="HP Fleet">HP Fleet</option>
          <option value="Lenovo Fleet">Lenovo Fleet</option>
        </select>
      </div>

      <div class="input-group">
        <label>Analysis Period</label>
        <select class="custom-select" #periodSelect>
          <option value="Q1 2026">Q1 2026 (Jan - Mar)</option>
          <option value="Q2 2026">Q2 2026 (Apr - Jun)</option>
          <option value="Current Month">Current Month</option>
        </select>
      </div>

      <div class="input-group">
        <label>Output Format</label>
        <div class="format-toggle">
          <button class="btn-toggle active">PDF</button>
          <button class="btn-toggle">Excel (XLSX)</button>
        </div>
      </div>
    </div>

    <div class="builder-actions">
      <button class="btn-generate" (click)="onGenerateCustomReport(brandSelect.value, periodSelect.value)">
        <mat-icon>auto_awesome</mat-icon> Generate Custom Insight
      </button>
    </div>
  </div>
</div>
